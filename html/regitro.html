<body>

<h2>Formulario de Registro de Dueños de Gatos</h2>

<form action="procesar.php" method="post" enctype="text/plain" accept="text/html">

    <label for="nombre">Nombre:</label><br>
    <input type="text" name="nombre" id="nombre" size="30" maxlength="20" value=""><br><br>

    <label for="apellidos">Apellidos:</label><br>
    <input type="text" name="apellidos" id="apellidos" size="30" maxlength="30" value=""><br><br>

    <label for="correo">Correo electrónico:</label><br>
    <input type="email" name="correo" id="correo" size="30" maxlength="40"><br><br>

    <label for="telefono">Teléfono:</label><br>
    <input type="tel" name="telefono" id="telefono" size="15" maxlength="10"><br><br>

    <label for="gatos">¿Cuántos gatos tienes?</label><br>
    <input type="number" name="gatos" id="gatos" value="1"><br><br>

    <label>Tipo de alimento que usas:</label><br>
    <input type="radio" name="alimento" value="seco" checked> Seco<br>
    <input type="radio" name="alimento" value="humedo"> Húmedo<br>
    <input type="radio" name="alimento" value="casero"> Casero<br><br>

    <label>Servicios que te interesan:</label><br>
    <label style="color: white;">
        <input type="checkbox" name="servicio1" value="veterinario" checked>
        Veterinario
    </label><br>

    <label style="color: white;">
        <input type="checkbox" name="servicio2" value="estetica">
        Estética
    </label><br>

    <label style="color: white;">
        <input type="checkbox" name="servicio3" value="alimentos">
        Alimentos
    </label><br>

    <label for="edad_gato">Edad de tu gato:</label><br>
    <select name="edad_gato" id="edad_gato">
        <option value="cachorro">Cachorro</option>
        <option value="joven">Joven</option>
        <option value="adulto">Adulto</option>
        <option value="senior">Senior</option>
    </select><br><br>

    <label for="comentarios">Comentarios:</label><br>
    <textarea name="comentarios" id="comentarios" rows="4" maxlength="100"></textarea><br><br>

    <input type="submit" value="Enviar">

</form>

</body>

<footer>
        <p>PURINA</p>
    </footer>

</html>
